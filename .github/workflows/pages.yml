name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "cursor/github-pages-migration-8906"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
    environment:
      name: work-diary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime config from environment secret
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          test -n "$APPS_SCRIPT_URL" || (echo "Missing secret APPS_SCRIPT_URL in environment work-diary" && exit 1)
          cat > config.js <<EOF
          window.DIARY_APP_CONFIG = Object.assign(
            {
              APPS_SCRIPT_URL: "${APPS_SCRIPT_URL}"
            },
            window.DIARY_APP_CONFIG || {}
          );
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

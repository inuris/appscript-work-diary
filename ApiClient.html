<!--
  HtmlService: scripts in files loaded via include() are often NOT executed.
  The live copy of this client is inlined in Index.html (search for DiaryTransport).
  This file stays in the repo as the single source to edit; copy changes into Index.html.
-->
<script>
window.DiaryTransport = (function () {
  function run(funcName, payload) {
    return new Promise(function (resolve, reject) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function (err) {
          reject(new Error((err && err.message) || String(err)));
        })[funcName](payload || {});
    });
  }

  function createAppsScriptRunTransport() {
    return {
      list: function () {
        return run("apiList", {}).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data.entries || [];
        });
      },
      create: function (payload) {
        return run("apiCreate", payload).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data;
        });
      },
      update: function (payload) {
        return run("apiUpdate", payload).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data;
        });
      },
      remove: function (payload) {
        return run("apiDelete", payload).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data;
        });
      },
      importLogs: function (payload) {
        return run("apiImport", payload).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data;
        });
      },
      appendTag: function (payload) {
        return run("apiAppendTag", payload).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data;
        });
      },
    };
  }

  function createHttpTransport(baseUrl) {
    function post(action, payload) {
      return fetch(baseUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=UTF-8" },
        body: JSON.stringify({ action: action, payload: payload || {} }),
      }).then(function (r) {
        return r.json();
      }).then(function (data) {
        if (!data.ok) throw new Error(data.error || "Apps Script error");
        return data;
      });
    }
    return {
      list: function () {
        return fetch(baseUrl + "?action=list").then(function (r) {
          return r.json();
        }).then(function (data) {
          if (!data.ok) throw new Error(data.error || "Apps Script error");
          return data.entries || [];
        });
      },
      create: function (payload) {
        return post("create", payload);
      },
      update: function (payload) {
        return post("update", payload);
      },
      remove: function (payload) {
        return post("delete", payload);
      },
      importLogs: function (payload) {
        return post("import", payload);
      },
      appendTag: function (payload) {
        return post("append_tag", payload);
      },
    };
  }

  return {
    createAppsScriptRunTransport: createAppsScriptRunTransport,
    createHttpTransport: createHttpTransport,
  };
})();
</script>

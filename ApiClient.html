<script>
(function () {
  const { createApp, ref, onMounted, onBeforeUnmount } = Vue;

  function getAppScriptBaseUrl() {
    var cfg = window.DIARY_APP_CONFIG || {};
    return String(cfg.APPS_SCRIPT_URL || "")
      .trim()
      .replace(/\/$/, "");
  }

  function isGasHosted() {
    return (
      typeof google !== "undefined" &&
      google.script &&
      typeof google.script.run !== "undefined"
    );
  }

  function normalizeEntry(e) {
    var out = Object.assign({}, e);
    if (out.id != null && out.id !== "") {
      var n = parseInt(String(out.id), 10);
      if (!Number.isNaN(n)) out.id = n;
    }
    if (!Array.isArray(out.tags)) out.tags = [];
    return out;
  }

  function stripAccents(value) {
    if (value == null) return "";
    return String(value)
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase();
  }

  function filterEntries(list, search, tag) {
    var searchNo = stripAccents(search.trim());
    var tagLower = tag.trim().toLowerCase();
    var out = [];
    for (var i = 0; i < list.length; i++) {
      var e = list[i];
      var ne = normalizeEntry(e);
      if (tagLower) {
        var tags = (ne.tags || []).map(function (t) {
          return String(t).toLowerCase();
        });
        if (tags.indexOf(tagLower) === -1) continue;
      }
      if (!search.trim()) {
        out.push(ne);
        continue;
      }
      var raw = stripAccents(ne.raw_text || "");
      var summ = stripAccents(ne.summary || "");
      var tagsBlob = stripAccents(JSON.stringify(ne.tags || []));
      if (
        raw.indexOf(searchNo) !== -1 ||
        summ.indexOf(searchNo) !== -1 ||
        tagsBlob.indexOf(searchNo) !== -1
      ) {
        out.push(ne);
      }
    }
    out.sort(function (a, b) {
      return String(b.created_at || "").localeCompare(String(a.created_at || ""));
    });
    return out;
  }

  createApp({
    setup: function () {
      var transport = ref(null);
      var draft = ref("");
      var entries = ref([]);
      var searchQ = ref("");
      var tagFilter = ref("");
      var loading = ref(false);
      var saveBusy = ref(null);
      var loadError = ref("");
      var saveError = ref("");
      var importText = ref("");
      var importBusy = ref(false);
      var importResult = ref("");
      var editingId = ref(null);
      var editDraft = ref("");
      var editBusy = ref(null);
      var tagMenu = ref({
        visible: false,
        x: 0,
        y: 0,
        entryId: null,
        phrase: "",
      });
      var runtimeWarning = ref("");
      var debounceTimer = null;

      async function loadEntries() {
        if (!transport.value) {
          entries.value = [];
          return;
        }
        loading.value = true;
        loadError.value = "";
        try {
          var all = await transport.value.list();
          var mapped = (all || []).map(normalizeEntry);
          var s = searchQ.value.trim();
          var t = tagFilter.value.trim();
          entries.value = filterEntries(mapped, s, t);
        } catch (e) {
          loadError.value = (e && e.message) || "Failed to load entries";
          entries.value = [];
        } finally {
          loading.value = false;
        }
      }

      function debouncedLoad() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function () {
          void loadEntries();
        }, 300);
      }

      function clearSearch() {
        searchQ.value = "";
        debouncedLoad();
      }

      function stripAccent(text) {
        return String(text || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function foldWithMap(source) {
        var folded = "";
        var indexMap = [];
        for (var i = 0; i < source.length; i++) {
          var f = stripAccent(source[i]);
          if (!f) continue;
          for (var j = 0; j < f.length; j++) {
            folded += f[j];
            indexMap.push(i);
          }
        }
        return { folded: folded, indexMap: indexMap };
      }

      function highlightText(text) {
        var q = searchQ.value.trim();
        var safe = escapeHtml(text);
        if (!q) return safe.replace(/\n/g, "<br>");
        var source = String(text || "");
        var qFolded = stripAccent(q);
        if (!qFolded) return safe.replace(/\n/g, "<br>");

        var fm = foldWithMap(source);
        var folded = fm.folded;
        var indexMap = fm.indexMap;
        var ranges = [];
        var seek = 0;
        while (seek < folded.length) {
          var hitAt = folded.indexOf(qFolded, seek);
          if (hitAt < 0) break;
          var start = indexMap[hitAt];
          var endIdx = hitAt + qFolded.length - 1;
          var end = (indexMap[endIdx] != null ? indexMap[endIdx] : start) + 1;
          ranges.push([start, end]);
          seek = hitAt + qFolded.length;
        }
        if (!ranges.length) return safe.replace(/\n/g, "<br>");

        var out = "";
        var cursor = 0;
        for (var r = 0; r < ranges.length; r++) {
          var s = ranges[r][0];
          var e = ranges[r][1];
          out += escapeHtml(source.slice(cursor, s));
          out +=
            '<span class="highlight">' + escapeHtml(source.slice(s, e)) + "</span>";
          cursor = e;
        }
        out += escapeHtml(source.slice(cursor));
        return out.replace(/\n/g, "<br>");
      }

      async function saveEntry() {
        var raw_text = draft.value.trim();
        if (!raw_text || !transport.value) return;
        saveBusy.value = "save";
        saveError.value = "";
        try {
          await transport.value.create({ raw_text: raw_text });
          draft.value = "";
          await loadEntries();
        } catch (e) {
          saveError.value = (e && e.message) || "Save failed";
        } finally {
          saveBusy.value = null;
        }
      }

      function startEdit(entry) {
        editingId.value = entry.id;
        editDraft.value = entry.raw_text || "";
      }

      function cancelEdit() {
        editingId.value = null;
        editDraft.value = "";
        editBusy.value = null;
      }

      async function updateEntry() {
        if (!editingId.value || !editDraft.value.trim() || !transport.value) return;
        editBusy.value = "save";
        saveError.value = "";
        try {
          await transport.value.update({
            id: editingId.value,
            raw_text: editDraft.value.trim(),
          });
          cancelEdit();
          await loadEntries();
        } catch (e) {
          saveError.value = (e && e.message) || "Update failed";
        } finally {
          editBusy.value = null;
        }
      }

      async function importLogs() {
        if (!importText.value.trim() || !transport.value) return;
        importBusy.value = true;
        importResult.value = "";
        saveError.value = "";
        try {
          var parsed = JSON.parse(importText.value);
          var logs = Array.isArray(parsed) ? parsed : parsed.logs;
          if (!Array.isArray(logs) || !logs.length)
            throw new Error("Invalid import JSON");
          var data = await transport.value.importLogs({ logs: logs });
          importResult.value =
            "Imported " +
            data.imported_count +
            " logs. Errors: " +
            data.error_count +
            ".";
          await loadEntries();
        } catch (e) {
          importResult.value = "";
          saveError.value = (e && e.message) || "Import failed";
        } finally {
          importBusy.value = false;
        }
      }

      async function deleteEntry(id) {
        if (!transport.value) return;
        saveError.value = "";
        try {
          await transport.value.remove({ id: id });
          if (editingId.value === id) cancelEdit();
          await loadEntries();
        } catch (e) {
          saveError.value = (e && e.message) || "Delete failed";
        }
      }

      async function removeTag(entry, tagToRemove) {
        if (!transport.value) return;
        var nextTags = (entry.tags || []).filter(function (t) {
          return t !== tagToRemove;
        });
        saveError.value = "";
        try {
          await transport.value.update({
            id: entry.id,
            raw_text: entry.raw_text || "",
            tags: nextTags,
          });
          await loadEntries();
        } catch (e) {
          saveError.value = (e && e.message) || "Remove tag failed";
        }
      }

      function openTagMenu(event, entry) {
        var sel = window.getSelection && window.getSelection();
        var phrase = (sel ? sel.toString() : "").trim();
        if (!phrase) return;
        event.preventDefault();
        tagMenu.value = {
          visible: true,
          x: Math.min(event.clientX, window.innerWidth - 210),
          y: Math.min(event.clientY, window.innerHeight - 60),
          entryId: entry.id,
          phrase: phrase,
        };
      }

      function closeTagMenu() {
        if (!tagMenu.value.visible) return;
        tagMenu.value = {
          visible: false,
          x: 0,
          y: 0,
          entryId: null,
          phrase: "",
        };
      }

      async function addSelectionAsTag() {
        if (
          !tagMenu.value.entryId ||
          !tagMenu.value.phrase ||
          !transport.value
        ) {
          closeTagMenu();
          return;
        }
        try {
          await transport.value.appendTag({
            id: tagMenu.value.entryId,
            tag: tagMenu.value.phrase,
          });
          await loadEntries();
        } catch (e) {
          saveError.value = (e && e.message) || "Add tag failed";
        } finally {
          closeTagMenu();
        }
      }

      function formatDate(iso) {
        if (!iso) return "";
        var normalized = String(iso).indexOf("T") >= 0 ? iso : String(iso).replace(" ", "T") + "Z";
        var d = new Date(normalized);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleString("vi-VN", {
          timeZone: "Asia/Ho_Chi_Minh",
          dateStyle: "medium",
          timeStyle: "short",
        });
      }

      onMounted(function () {
        window.addEventListener("scroll", closeTagMenu, true);
        window.addEventListener("resize", closeTagMenu);

        if (
          typeof window !== "undefined" &&
          window.location.protocol === "file:"
        ) {
          runtimeWarning.value =
            "Do not open this page as file://. Serve it over http (e.g. npx serve) — otherwise the browser blocks requests to Google Apps Script.";
        }

        if (isGasHosted()) {
          transport.value = window.DiaryTransport.createAppsScriptRunTransport();
        } else {
          var base = getAppScriptBaseUrl();
          if (!base) {
            loadError.value =
              "Set APPS_SCRIPT_URL in window.DIARY_APP_CONFIG (or open this UI from the Apps Script Web App).";
          } else {
            transport.value = window.DiaryTransport.createHttpTransport(base);
          }
        }
        void loadEntries();
      });

      onBeforeUnmount(function () {
        window.removeEventListener("scroll", closeTagMenu, true);
        window.removeEventListener("resize", closeTagMenu);
      });

      return {
        draft: draft,
        entries: entries,
        searchQ: searchQ,
        tagFilter: tagFilter,
        loading: loading,
        saveBusy: saveBusy,
        loadError: loadError,
        runtimeWarning: runtimeWarning,
        saveError: saveError,
        importText: importText,
        importBusy: importBusy,
        importResult: importResult,
        editingId: editingId,
        editDraft: editDraft,
        editBusy: editBusy,
        saveEntry: saveEntry,
        importLogs: importLogs,
        startEdit: startEdit,
        cancelEdit: cancelEdit,
        updateEntry: updateEntry,
        deleteEntry: deleteEntry,
        removeTag: removeTag,
        tagMenu: tagMenu,
        openTagMenu: openTagMenu,
        closeTagMenu: closeTagMenu,
        addSelectionAsTag: addSelectionAsTag,
        debouncedLoad: debouncedLoad,
        clearSearch: clearSearch,
        highlightText: highlightText,
        formatDate: formatDate,
      };
    },
  }).mount("#app");
})();
</script>

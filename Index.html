<!DOCTYPE html>
<!-- Index.html — HtmlService: sidebar (new entry + import) + main (search & results first). -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Diary</title>
  <?!= include('DiaryStyles'); ?>
</head>
<body>
  <script>
    window.DIARY_APP_CONFIG = {
      APPS_SCRIPT_URL: <?!= JSON.stringify(webAppUrl || "") ?>
    };
  </script>

  <div id="app" class="app-shell">
    <aside class="sidebar panel">
      <h2 class="sidebar-heading">New entry</h2>
      <label for="entry-title">Title</label>
      <input id="entry-title" type="text" placeholder="Short title" />
      <label for="entry-desc">Description</label>
      <textarea id="entry-desc" class="sidebar-textarea" placeholder="Body text…"></textarea>
      <div class="tags-field-wrap">
        <label for="entry-tags" title="Comma-separated. Suggestions show most-used tags first.">Tags</label>
        <input
          id="entry-tags"
          type="text"
          placeholder="e.g. work, health"
          list="tag-datalist"
          autocomplete="off"
        />
        <datalist id="tag-datalist"></datalist>
        <div id="tag-suggest-panel" class="tag-suggest-panel" hidden></div>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-save" disabled>Save</button>
      </div>
      <p id="save-error" class="err" style="display: none"></p>

      <div class="sidebar-section import-block">
        <label for="import-json" class="label-tip">
          Import JSON
          <span
            class="tip-icon"
            tabindex="0"
            role="tooltip"
            title="In Cursor, start a message with the keyword &quot;diary input&quot; so the AI returns import JSON (logs). Paste the result here — no need to edit the shape by hand."
            >?</span
          >
        </label>
        <textarea
          id="import-json"
          class="import-textarea"
          placeholder="Paste JSON from AI (diary)" 
          rows="5"
        ></textarea>
        <div class="btn-row">
          <button type="button" id="btn-import" disabled>Import</button>
        </div>
      </div>
    </aside>

    <main class="main-pane">
      <h1 class="main-title">Diary</h1>
      <p id="runtime-warning" class="err" style="display: none"></p>

      <section class="panel search-panel">
        <div class="row">
          <div>
            <label for="q">Search</label>
            <div class="search-wrap">
              <input id="q" type="search" placeholder="Keyword…" />
              <button id="search-clear" class="search-clear" type="button" style="display: none" aria-label="Clear search">×</button>
            </div>
          </div>
          <div>
            <label for="tag">Filter by tag</label>
            <input id="tag" type="text" placeholder="Exact tag…" />
          </div>
        </div>
      </section>

      <p id="load-error" class="err" style="display: none"></p>
      <p id="empty-none" class="empty" style="display: none">No entries yet.</p>
      <p id="empty-nomatch" class="empty" style="display: none">No matching entries.</p>

      <div id="bulk-bar" class="bulk-bar panel" style="display: none">
        <label class="bulk-select-all"
          ><input type="checkbox" id="bulk-select-all" /> All shown</label
        >
        <span id="bulk-selected-label" class="bulk-muted"></span>
        <div class="bulk-actions">
          <input
            type="text"
            id="bulk-tag-input"
            placeholder="Tag…"
          />
          <button type="button" id="bulk-add-tag-btn" class="secondary bulk-action-btn">
            Add tag
          </button>
          <button type="button" id="bulk-delete-btn" class="secondary bulk-delete-btn bulk-action-btn">
            Delete
          </button>
        </div>
      </div>

      <div id="entry-list" class="entry-list-scroll"></div>

      <div
        id="ctx-menu"
        class="ctx-menu"
        style="display: none; position: fixed; z-index: 1000"
      >
        <button type="button" id="ctx-add-tag">Add selection as tag</button>
      </div>
    </main>
  </div>

  <div
    id="sync-indicator"
    class="sync-indicator"
    hidden
    title="Talking to server…"
    aria-live="polite"
  >
    <span class="sync-spinner" aria-hidden="true"></span>
  </div>

  <div
    id="import-modal"
    class="modal-root"
    hidden
    aria-hidden="true"
  >
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-dialog panel" role="dialog" aria-labelledby="import-modal-title">
      <h2 id="import-modal-title" class="modal-title">Import results</h2>
      <div id="import-modal-body"></div>
      <div class="btn-row modal-actions">
        <button type="button" class="secondary" data-close-modal>Close</button>
      </div>
    </div>
  </div>

  <script>
  window.DiaryTransport = (function () {
    function run(funcName, payload) {
      return new Promise(function (resolve, reject) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(function (err) {
            reject(new Error((err && err.message) || String(err)));
          })[funcName](payload || {});
      });
    }

    function createAppsScriptRunTransport() {
      return {
        list: function () {
          return run("apiList", {}).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data.entries || [];
          });
        },
        create: function (payload) {
          return run("apiCreate", payload).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
        },
        update: function (payload) {
          return run("apiUpdate", payload).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
        },
        remove: function (payload) {
          return run("apiDelete", payload).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
        },
        importLogs: function (payload) {
          return run("apiImport", payload).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
        },
        appendTag: function (payload) {
          return run("apiAppendTag", payload).then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
        },
      };
    }

    function createHttpTransport(baseUrl) {
      function post(action, payload) {
        return fetch(baseUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=UTF-8" },
          body: JSON.stringify({ action: action, payload: payload || {} }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (!data.ok) throw new Error(data.error || "Apps Script error");
            return data;
          });
      }
      return {
        list: function () {
          return fetch(baseUrl + "?action=list")
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (!data.ok) throw new Error(data.error || "Apps Script error");
              return data.entries || [];
            });
        },
        create: function (payload) {
          return post("create", payload);
        },
        update: function (payload) {
          return post("update", payload);
        },
        remove: function (payload) {
          return post("delete", payload);
        },
        importLogs: function (payload) {
          return post("import", payload);
        },
        appendTag: function (payload) {
          return post("append_tag", payload);
        },
      };
    }

    return {
      createAppsScriptRunTransport: createAppsScriptRunTransport,
      createHttpTransport: createHttpTransport,
    };
  })();
  </script>
  <?!= include('DiaryUiVanilla'); ?>
</body>
</html>

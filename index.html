<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Personal Diary</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <script src="config.js"></script>

  <div id="app" class="app-shell">
    <aside id="app-sidebar" class="sidebar panel">
      <div class="sidebar-heading-wrap">
        <h2 class="sidebar-heading">Add New</h2>
      </div>
      <p id="save-error" class="err" style="display: none"></p>
      <div class="sidebar-section import-block">
        <label for="add-input" class="label-tip">
          Input text
          <span
            class="tip-icon"
            tabindex="0"
            role="tooltip"
            title="Rich text is recommended (headings, bullets, numbering). AI will split into entries, then extract raw_text, title, summary."
            >?</span
          >
        </label>
        <textarea
          id="add-input"
          class="import-textarea"
          placeholder="Paste plain text or rich text here..."
          rows="10"
        ></textarea>
        <div class="btn-row">
          <button type="button" id="btn-add" disabled>Add</button>
        </div>
      </div>
    </aside>

    <main class="main-pane">
      <div class="main-title-row">
        <h1 class="main-title">Diary</h1>
        <button
          type="button"
          id="mobile-menu-toggle"
          class="secondary mobile-menu-btn"
          aria-controls="app-sidebar"
          aria-expanded="false"
        >
          Add
        </button>
      </div>
      <p id="runtime-warning" class="err" style="display: none"></p>

      <section class="panel search-panel">
        <div class="row">
          <div>
            <label for="q">Search</label>
            <div class="search-wrap">
              <input id="q" type="search" placeholder="Keyword…" />
              <button id="search-clear" class="search-clear" type="button" style="display: none" aria-label="Clear search">×</button>
            </div>
          </div>
          <div>
            <label for="tag">Filter by tag</label>
            <input id="tag" type="text" placeholder="Exact tag…" />
          </div>
        </div>
      </section>

      <p id="load-error" class="err" style="display: none"></p>
      <p id="empty-none" class="empty" style="display: none">No entries yet.</p>
      <p id="empty-nomatch" class="empty" style="display: none">No matching entries.</p>

      <div id="bulk-bar" class="bulk-bar panel" style="display: none">
        <label class="bulk-select-all"
          ><input type="checkbox" id="bulk-select-all" /> All shown</label
        >
        <span id="bulk-selected-label" class="bulk-muted"></span>
        <div class="bulk-actions">
          <input
            type="text"
            id="bulk-tag-input"
            placeholder="Tag…"
          />
          <button type="button" id="bulk-add-tag-btn" class="secondary bulk-action-btn">
            Add tag
          </button>
          <button type="button" id="bulk-delete-btn" class="secondary bulk-delete-btn bulk-action-btn">
            Delete
          </button>
        </div>
      </div>

      <div id="entry-list" class="entry-list-scroll"></div>

      <div
        id="ctx-menu"
        class="ctx-menu"
        style="display: none; position: fixed; z-index: 1000"
      >
        <button type="button" id="ctx-add-tag">Add selection as tag</button>
      </div>
    </main>
  </div>

  <div
    id="sync-indicator"
    class="sync-indicator"
    hidden
    title="Talking to server…"
    aria-live="polite"
  >
    <span class="sync-spinner" aria-hidden="true"></span>
  </div>

  <div id="import-modal" class="modal-root" hidden aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-dialog panel" role="dialog" aria-labelledby="import-modal-title">
      <h2 id="import-modal-title" class="modal-title">Import results</h2>
      <div id="import-modal-body"></div>
      <div class="btn-row modal-actions">
        <button type="button" class="secondary" data-close-modal>Close</button>
      </div>
    </div>
  </div>

  <div id="preview-modal" class="modal-root" hidden aria-hidden="true">
    <div class="modal-backdrop" data-close-preview></div>
    <div class="modal-dialog panel" role="dialog" aria-labelledby="preview-modal-title">
      <h2 id="preview-modal-title" class="modal-title">Preview entries from AI</h2>
      <div id="preview-modal-body"></div>
      <div class="btn-row modal-actions">
        <button type="button" class="secondary" data-close-preview>Cancel</button>
        <button type="button" id="preview-approve-btn">Approve</button>
      </div>
    </div>
  </div>

  <script src="transport.js"></script>
  <script src="app.js"></script>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
  <button id="fab-new" class="fab-new" type="button" aria-label="New entry">+</button>
</body>
</html>
